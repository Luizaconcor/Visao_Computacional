services:
  - type: web
    name: evento-face-access
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/evento.db
      - key: UPLOAD_FOLDER
        value: /var/data/uploads/fotos
      - key: MAX_CONTENT_LENGTH
        value: 5242880
